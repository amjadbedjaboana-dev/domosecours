<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Trame en Direct</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 2rem;
            background: #fdfdfd;
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 80%;
            max-width: 900px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #007BFF;
            margin-bottom: 25px;
            font-weight: 600;
        }
        #notif {
            display: none;
            padding: 1rem;
            background-color: #dff0d8;
            color: #28a745;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            animation: fadein 0.5s;
            font-size: 1.1em;
            font-weight: bold;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .navigation-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px; /* Espace entre les boutons */
        }
        .navigation-buttons button {
            background-color: #6c757d;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .navigation-buttons button:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📡 Trame en Direct :</h2>
        <div id="notif"></div>

        <div class="navigation-buttons">
            <button onclick="location.href='{{ url_for('login') }}'">Retour au Login</button>
            <button onclick="location.href='{{ url_for('controle_page') }}'">Aller au Contrôle Robot</button>
        </div>
    </div>

    <script>
        let lastMessage = "";

        async function checkForUpdate() {
            try {
                const response = await fetch('/last_trame_data'); // Nouvelle route pour la trame
                const text = await response.text();
                if (text && text !== lastMessage) {
                    lastMessage = text;
                    const notif = document.getElementById("notif");
                    notif.textContent = "Nouvelle trame reçue: " + text;
                    notif.style.display = "block";
                    // Optionnel: masquer après quelques secondes
                    // setTimeout(() => { notif.style.display = "none"; }, 5000);
                }
            } catch (error) {
                console.error("Erreur lors de la récupération de la trame :", error);
            }
        }

        // Mettre à jour toutes les 3 secondes
        setInterval(checkForUpdate, 3000);
        // Exécuter une première fois au chargement
        checkForUpdate();
    </script>
</body>
</html>
